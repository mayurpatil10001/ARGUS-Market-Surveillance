name: ARGUS Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  # ── Job 1: Run full test suite ───────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run ARGUS verification suite
        run: python verify_argus.py

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: false

      - name: Run PS-402 demo
        run: python demo/ps402_demo.py

  # ── Job 2: Build and push Docker images to ECR ───────────────────────────────
  build-and-push:
    name: Build & push Docker images
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (short SHA)
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/argus-api:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/argus-api:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/argus-api:latest
          cache-to: type=inline

      - name: Build & push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/argus-dashboard:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/argus-dashboard:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/argus-dashboard:latest
          cache-to: type=inline

  # ── Job 3: Deploy to EC2 via SSM (no SSH required) ──────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Find ARGUS EC2 instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=ARGUS" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM RunCommand
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "ARGUS deploy ${{ needs.build-and-push.outputs.image_tag }}" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ec2-user/argus",
              "git pull origin main",
              "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker compose -f docker-compose.prod.yml -f docker-compose.aws.yml pull argus-api argus-dashboard",
              "docker compose -f docker-compose.prod.yml -f docker-compose.aws.yml run --rm argus-api python -m alembic upgrade head",
              "docker compose -f docker-compose.prod.yml -f docker-compose.aws.yml up -d --no-deps argus-api",
              "sleep 15",
              "curl -sf http://localhost:8000/health || exit 1",
              "docker compose -f docker-compose.prod.yml -f docker-compose.aws.yml up -d --no-deps argus-worker",
              "docker compose -f docker-compose.prod.yml -f docker-compose.aws.yml up -d --no-deps argus-dashboard",
              "echo DEPLOY_OK"
            ]' \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $COMMAND_ID"

      - name: Wait for deploy to complete
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.COMMAND_ID }}" \
            --instance-id "${{ steps.ec2.outputs.INSTANCE_ID }}"

      - name: Print deploy output
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.COMMAND_ID }}" \
            --instance-id "${{ steps.ec2.outputs.INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. Check CloudWatch Logs:"
          echo "https://${{ env.AWS_REGION }}.console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group/$252Fargus$252Fapp"
