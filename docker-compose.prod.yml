version: "3.9"

networks:
  argus-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  argus_reports:
  argus_models:

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - argus-net
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    networks:
      - argus-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Zookeeper (Kafka coordinator) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    networks:
      - argus-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    networks:
      - argus-net
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── ARGUS API (FastAPI + all AI models) ─────────────────────────────────────
  argus-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    networks:
      - argus-net
    env_file:
      - .env.prod
    environment:
      POSTGRES_URL: postgresql://argus:${POSTGRES_PASSWORD}@postgres:5432/argus
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - argus_reports:/tmp/argus_reports
      - argus_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ── ARGUS Worker (Kafka consumer) ────────────────────────────────────────────
  argus-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    networks:
      - argus-net
    command: python -m data.pipeline.kafka_consumer
    env_file:
      - .env.prod
    depends_on:
      argus-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # ── ARGUS React Dashboard ────────────────────────────────────────────────────
  argus-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    networks:
      - argus-net
    depends_on:
      argus-api:
        condition: service_healthy
    environment:
      VITE_API_URL: /api
      VITE_USE_MOCK: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy (port 80 + 443) ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    networks:
      - argus-net
    depends_on:
      argus-api:
        condition: service_healthy
      argus-dashboard:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - argus_reports:/tmp/argus_reports:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
