version: "3.9"

# ── Profiles ──────────────────────────────────────────────────────────────────
# Default (no profile):  postgres + redis + argus-api
# --profile kafka:       adds zookeeper + kafka + argus-worker
#
# Usage:
#   docker compose up                          # minimal — API only
#   docker compose --profile kafka up          # full stack with Kafka

networks:
  argus-net:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus} -d ${POSTGRES_DB:-argus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    networks:
      - argus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────────────────────
  argus-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      # Enable BuildKit cache mounts (set DOCKER_BUILDKIT=1 or use `docker buildx`)
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: argus-api:latest
    container_name: argus-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - argus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    # NOTE: No volume mount — code baked into image at build time.
    # For live-reload in dev, use: docker compose -f docker-compose.dev.yml up

  # ── Zookeeper (kafka profile only) ───────────────────────────────────────────
  zookeeper:
    profiles: [kafka]
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: argus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Kafka (kafka profile only) ────────────────────────────────────────────────
  kafka:
    profiles: [kafka]
    image: confluentinc/cp-kafka:7.5.0
    container_name: argus-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Kafka worker (kafka profile only) ─────────────────────────────────────────
  argus-worker:
    profiles: [kafka]
    build:
      context: .
      dockerfile: Dockerfile.api
    image: argus-api:latest   # reuses the same built image — no second build
    container_name: argus-worker
    command: ["python", "-m", "data.pipeline.kafka_consumer"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - argus-net
    restart: unless-stopped
