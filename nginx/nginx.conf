# ARGUS production Nginx configuration
# Serves React UI + API + SSE stream + PDF downloads behind a single reverse proxy.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Request limits ─────────────────────────────────────────────────────────
    client_max_body_size 50M;   # large batch ingest payloads

    # ── Proxy timeouts ─────────────────────────────────────────────────────────
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;

    # ── Upstream pools ─────────────────────────────────────────────────────────
    upstream argus_api {
        server argus-api:8000;
        keepalive 32;
    }

    upstream argus_ui {
        server argus-dashboard:5173;
        keepalive 16;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # HTTP — port 80
    # In production, redirect to HTTPS. During initial setup, serves directly.
    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health probe (Nginx itself) ───────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://argus_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            add_header         X-Content-Type-Options nosniff;
            add_header         X-Frame-Options        DENY;
        }

        # ── SSE live alert stream (disable buffering) ─────────────────────────
        location /api/alerts/live {
            proxy_pass              http://argus_api/alerts/live;
            proxy_buffering         off;
            proxy_cache             off;
            proxy_set_header        Connection '';
            proxy_http_version      1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout      3600s;
        }

        # ── PDF report downloads from shared volume ───────────────────────────
        location /reports/download/ {
            alias       /tmp/argus_reports/;
            add_header  Content-Disposition "attachment";
            types       { application/pdf pdf; }
        }

        # ── React SPA (catch-all) ─────────────────────────────────────────────
        location / {
            proxy_pass              http://argus_ui/;
            proxy_set_header        Host              $host;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        "upgrade";
            # SPA fallback: unknown paths served as index.html
            proxy_intercept_errors  on;
            error_page 404 = /index.html;
        }
    }

    # ──────────────────────────────────────────────────────────────────────────
    # HTTPS — port 443 (production serving block)
    # Place cert files at nginx/ssl/argus.crt + nginx/ssl/argus.key
    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/argus.crt;
        ssl_certificate_key /etc/nginx/ssl/argus.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Health probe ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://argus_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            add_header         X-Content-Type-Options nosniff;
            add_header         X-Frame-Options        DENY;
        }

        # ── SSE live alert stream ─────────────────────────────────────────────
        location /api/alerts/live {
            proxy_pass              http://argus_api/alerts/live;
            proxy_buffering         off;
            proxy_cache             off;
            proxy_set_header        Connection '';
            proxy_http_version      1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout      3600s;
        }

        # ── PDF report downloads ──────────────────────────────────────────────
        location /reports/download/ {
            alias       /tmp/argus_reports/;
            add_header  Content-Disposition "attachment";
            types       { application/pdf pdf; }
        }

        # ── React SPA ─────────────────────────────────────────────────────────
        location / {
            proxy_pass              http://argus_ui/;
            proxy_set_header        Host              $host;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        "upgrade";
            proxy_intercept_errors  on;
            error_page 404 = /index.html;
        }
    }
}
